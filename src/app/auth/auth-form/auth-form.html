@if (mode()==="login"){
  <div class="flex justify-content-center align-items-center mt-2 ">
    <p-card  class="">
      <form [formGroup]="form" (ngSubmit)="submit()">
        <div class="field">
          <label>Email</label>
          <input formControlName="email" pInputText class="w-full">
        </div>
        <div class="field">
          <label>Mot de passe</label>
          <p-password formControlName="password" class="w-full" inputStyleClass="w-full"/>
        </div>
        <div class="flex justify-content-end gap-2">

          <p-button (onClick)="togglesMode()"
                    severity="secondary"
                    [label]="mode()=='login'?'cree un compte':'se connecter'"
          />
          <p-button type="submit"
                    [label]="mode()=='login'?'connexion':'cree le compte'"
          />
<!--          <p-button label="deconnection" (onClick)="logout()"/>-->
        </div>
      </form>
    </p-card>

  </div>

}
