<div>
  <p-card header="inscription">
    <form [formGroup]="form" >
      <div class="field">
        <label>Non d'utilisateur</label>
        <input pInputText formControlName="fullName" class="w-full">
      </div>
      <div class="field">
        <label>Email</label>
        <input pInputText formControlName="fullName" class="w-full">
      </div>
      <div class="field">
        <label>mot de passe</label>
        <p-password formControlName="password"
                    class="w-full"
                    inputStyleClass="w-full"/>
      </div>
      <div class="field">
        <label>mot de passe</label>
        <p-password formControlName="passwordConfirmation"
                    class="w-full"
                    inputStyleClass="w-full"/>
      </div>
      <div class="flex justify-content-end gap-2">
        <p-button severity="secondary" label="se compte"/>
        <p-button [disabled]="form.invalid" label="cree le compte"/>
      </div>

    </form>
  </p-card>
</div>
